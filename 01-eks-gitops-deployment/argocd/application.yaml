apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payment-service

  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/midhun7-hub/aws-eks-devops-platform.git
    targetRevision: main
    path: 01-eks-gitops-deployment/helm/payment-service

    helm:
      releaseName: payment-service

  destination:
    server: https://kubernetes.default.svc
    namespace: payment

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: customer-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customer-service

  template:
    metadata:
      labels:
        app: customer-service

    spec:
      serviceAccountName: dynamodb-sa

      containers:
      - name: customer-service

        image: 191072690914.dkr.ecr.ap-south-1.amazonaws.com/customer-service:v1

        ports:
        - containerPort: 3000

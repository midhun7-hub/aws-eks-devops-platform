name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 23-cicd-pipeline/app

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

      - name: Build Docker Image
        run: |
          docker build -t payment-service:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: payment-service:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Docker Image
        run: |
          docker tag payment-service:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/payment-service:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/payment-service:${{ github.sha }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Update Helm Image Tag
        run: |
          sed -i "s/tag:.*/tag: ${{ github.sha }}/" 23-cicd-pipeline/helm/payment-service/values.yaml

      - name: Commit Helm Changes
        run: |
          git add 23-cicd-pipeline/helm/payment-service/values.yaml
          git diff --cached --quiet || git commit -m "Update image tag to ${{ github.sha }}"

      - name: Push Helm Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
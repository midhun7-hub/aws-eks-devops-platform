name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test
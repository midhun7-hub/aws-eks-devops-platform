apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80